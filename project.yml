name: AgtmuxTerm
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.39.0

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # CRITICAL: -package-name makes both targets share the 'agtmux_term' Swift package namespace.
    # This allows 'package' access modifier to work across XcodeGen targets just like SwiftPM.
    OTHER_SWIFT_FLAGS: "$(inherited) -package-name agtmux_term"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targetTemplates:
  LocalCodeSign:
    settings:
      base:
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"

targets:
  AgtmuxTermCore:
    templates:
      - LocalCodeSign
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AgtmuxTermCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.g960059.agtmux.term.core
        PRODUCT_NAME: AgtmuxTermCore
        PRODUCT_MODULE_NAME: AgtmuxTermCore
        DEFINES_MODULE: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        SKIP_INSTALL: "YES"

  AgtmuxTerm:
    templates:
      - LocalCodeSign
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AgtmuxTerm
    resources:
      - path: Sources/AgtmuxTerm/Resources
    dependencies:
      - target: AgtmuxTermCore
      - target: AgtmuxDaemonService
      - framework: GhosttyKit/GhosttyKit.xcframework
        embed: false
        codeSign: false
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreGraphics.framework
      - sdk: IOSurface.framework
      - sdk: CoreText.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreVideo.framework
      - sdk: AppKit.framework
      - sdk: Foundation.framework
      - sdk: Carbon.framework
      - sdk: UserNotifications.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: WebKit.framework
      - sdk: libiconv.tbd
      - sdk: libc++.tbd
    postBuildScripts:
      - name: Bundle agtmux daemon
        shell: /bin/sh
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          src="${AGTMUX_BIN:-$SRCROOT/../agtmux/target/debug/agtmux}"
          if [ ! -x "$src" ]; then
            echo "error: agtmux binary not found at $src; set AGTMUX_BIN or build ../agtmux/target/debug/agtmux" >&2
            exit 1
          fi
          dest="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Tools/agtmux"
          mkdir -p "$(dirname "$dest")"
          cp "$src" "$dest"
          chmod +x "$dest"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.g960059.agtmux.term
        PRODUCT_NAME: AgtmuxTerm
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: agtmux-term
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: "YES"
          CODE_SIGN_ENTITLEMENTS: AgtmuxTerm.entitlements

  AgtmuxDaemonService:
    templates:
      - LocalCodeSign
    type: xpc-service
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AgtmuxDaemonService
    dependencies:
      - target: AgtmuxTermCore
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.g960059.agtmux.term.daemonservice
        PRODUCT_NAME: AgtmuxDaemonService
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Sources/AgtmuxDaemonService/Info.plist
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: "YES"
          CODE_SIGN_ENTITLEMENTS: AgtmuxDaemonService.entitlements

  AgtmuxTermCoreTests:
    templates:
      - LocalCodeSign
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/AgtmuxTermCoreTests
    dependencies:
      - target: AgtmuxTermCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.g960059.agtmux.term.core-tests
        GENERATE_INFOPLIST_FILE: "YES"

  AgtmuxTermIntegrationTests:
    templates:
      - LocalCodeSign
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/AgtmuxTermIntegrationTests
    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.g960059.agtmux.term.integration-tests
        GENERATE_INFOPLIST_FILE: "YES"

  AgtmuxTermUITests:
    templates:
      - LocalCodeSign
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/AgtmuxTermUITests
    dependencies:
      - target: AgtmuxTerm
      - target: AgtmuxTermCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.g960059.agtmux.term.uitests
        TEST_TARGET_NAME: AgtmuxTerm
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  AgtmuxTerm:
    build:
      targets:
        AgtmuxTerm: all
        AgtmuxTermUITests: [test]
    test:
      config: Debug
      targets:
        - name: AgtmuxTermUITests
